<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="google-site-verification" content="forN4VXVEL0Ql82cTffrs1ceZTaXIXUWTlONW4JyZ_Y" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiConvert</title>
    <style>
        * {
            transition: all 0.2s ease-in-out;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #CAF0F8;
            margin: 0;
            padding: 20px;
        }
        .container {
            margin-top: 50px;
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            width: 480px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #023E8A;
            margin-bottom: 8px;
        }
        p {
            color: #555;
            margin-bottom: 25px;
        }
        .drop-zone {
            border: 2px dashed #0077B6;
            padding: 40px 20px;
            margin: 20px auto;
            cursor: pointer;
            border-radius: 12px;
            background: #CAF0F8;
            max-width: 400px;
        }
        .drop-zone:hover {
            background: #90E0EF;
            transform: scale(1.02);
        }
        .drop-zone.dragover {
            background-color: #90E0EF;
            transform: scale(1.05);
            border-color: #023E8A;
        }
        input, select, button {
            margin: 12px auto;
            padding: 12px;
            width: 85%;
            max-width: 380px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            display: block;
        }
        select {
            background: white;
        }
        button {
            background: #0077B6;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            padding: 14px;
        }
        button:hover {
            background: #023E8A;
        }
        #preview {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        #preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #preview img:hover {
            transform: scale(1.15);
        }
        #loading {
            display: none;
            font-weight: bold;
            color: #0077B6;
            margin-top: 15px;
        }
        .info {
            font-size: 13px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MultiConvert 🚀</h1>
        <p>Convierte imágenes a JPG o PNG fácilmente</p>

        <form id="form" action="/upload" method="post" enctype="multipart/form-data">
            
            <label><strong>Formato de salida:</strong></label>
            <select name="formato">
                <option value="jpg">JPG (más ligero)</option>
                <option value="png">PNG (sin pérdida)</option>
            </select>

            <label><strong>Modo de descarga:</strong></label>
            <select name="modo">
                <option value="zip">Todo en un ZIP</option>
                <option value="individual">Descargar individualmente</option>
            </select>

            <div class="drop-zone" id="drop-zone">
                Arrastra tus imágenes aquí<br>o haz clic para seleccionar
                <input type="file" name="imagenes" id="fileInput" multiple accept="image/*" hidden>
            </div>

            <div id="preview"></div>

            <button type="submit">Convertir y Descargar</button>
            
            <p id="loading">Procesando imágenes... ⏳ Por favor espera</p>
        </form>

        <p class="info">Puedes subir varias imágenes al mismo tiempo</p>
    </div>

    <script>
        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");
        const form = document.getElementById("form");
        const loading = document.getElementById("loading");

        // Click en la zona para abrir selector de archivos
        dropZone.addEventListener("click", () => fileInput.click());

        // Drag & Drop
        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            fileInput.files = e.dataTransfer.files;
            mostrarPreview();
        });

        // Cuando se seleccionan archivos manualmente
        fileInput.addEventListener("change", mostrarPreview);

        function mostrarPreview() {
            preview.innerHTML = "";
            for (let file of fileInput.files) {
                if (file.type.startsWith("image/")) {
                    let reader = new FileReader();
                    reader.onload = function(e) {
                        let img = document.createElement("img");
                        img.src = e.target.result;
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                }
            }
        }

        // Mostrar mensaje de carga al enviar
        form.addEventListener("submit", () => {
            if (fileInput.files.length === 0) {
                alert("Por favor selecciona al menos una imagen");
                return;
            }
            loading.style.display = "block";
            // Deshabilitar botón para evitar doble envío
            form.querySelector("button").disabled = true;
        });
    </script>

</body>
</html>
