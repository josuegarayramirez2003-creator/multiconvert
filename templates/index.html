<!DOCTYPE html>
<html>
<head>
    <title>MultiConvert</title>

    <style>
    * {
        transition: all 0.2s ease-in-out; /* fluido en todo */
    }

    body {
        font-family: Arial;
        text-align: center;
        background: #CAF0F8;
    }

    .container {
        margin-top: 50px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 450px;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
        color: #023E8A;
    }

    p {
        color: #555;
    }

    .drop-zone {
        border: 2px dashed #0077B6;
        padding: 25px;
        margin: 20px;
        cursor: pointer;
        border-radius: 10px;
        background: #CAF0F8;
        transition: all 0.3s ease; /* reemplazado */
    }

    .drop-zone:hover {
        background: #90E0EF;
        transform: scale(1.02); /* nuevo */
    }

    .drop-zone.dragover {
        background-color: #90E0EF;
        transform: scale(1.05); /* nuevo */
        border-color: #023E8A;  /* nuevo */
    }

    input, select, button {
        margin: 10px;
        padding: 12px;
        width: 85%;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    select {
        background: white;
    }

    button {
        background: #0077B6;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: #023E8A;
    }

    #preview img {
        width: 80px;
        margin: 5px;
        border-radius: 5px;
        transition: transform 0.3s ease; /* reemplazado */
    }

    #preview img:hover {
        transform: scale(1.2); /* nuevo */
    }

    #loading {
        display: none;
        font-weight: bold;
        color: #0077B6;
    }

    #progress-container {
        display: none;
        width: 85%;
        margin: auto;
        background: #CAF0F8;
        border-radius: 10px;
        overflow: hidden;
    }

    #progress-bar {
        width: 0%;
        height: 20px;
        background: #0077B6;
        color: white;
        text-align: center;
        line-height: 20px;
        font-size: 12px;
    }
    </style>
</head>

<body>

<div class="container">
    <h1>MultiConvert 🚀</h1>
    <p>Arrastra tus imágenes o haz clic</p>

    <form id="form" action="/upload" method="post" enctype="multipart/form-data">

        <label>Formato:</label>
        <select name="formato">
            <option value="jpg">JPG</option>
            <option value="png">PNG</option>
        </select>

        <label>Modo:</label>
        <select name="modo">
            <option value="zip">ZIP</option>
            <option value="individual">Individual</option>
        </select>

        <div class="drop-zone" id="drop-zone">
            Arrastra archivos aquí o haz clic
            <input type="file" name="imagenes" id="fileInput" multiple hidden>
        </div>

        <div id="preview"></div>

        <button type="submit">Convertir y descargar</button>

        <p id="loading">Procesando imágenes... ⏳</p>

    </form>
</div>

<script>
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const form = document.getElementById("form");
const loading = document.getElementById("loading");

dropZone.addEventListener("click", () => fileInput.click());

dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    fileInput.files = e.dataTransfer.files;
    mostrarPreview();
});

fileInput.addEventListener("change", mostrarPreview);

function mostrarPreview() {
    preview.innerHTML = "";
    for (let file of fileInput.files) {
        let reader = new FileReader();
        reader.onload = function(e) {
            let img = document.createElement("img");
            img.src = e.target.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    }
}

form.addEventListener("submit", () => {
    loading.style.display = "block";
});
</script>

</body>
</html>
