<!DOCTYPE html>
<html>
<head>
    <title>MultiConvert - Login</title>

    <style>
    * {
        transition: all 0.2s ease-in-out;
    }

    body {
        font-family: Arial;
        text-align: center;
        background: #CAF0F8;
    }

    .container {
        margin-top: 100px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 450px;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
        color: #023E8A;
    }

    h2 {
        color: #023E8A;
    }

    p {
        color: #555;
    }

    input, button {
        margin: 10px;
        padding: 12px;
        width: 85%;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        background: #0077B6;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #023E8A;
    }
    </style>
</head>

<body>

<div class="container">
    <h1>MultiConvert 🚀</h1>
    <p>Inicia sesión para continuar</p>

    <form method="post">
        <h2>Login</h2>
        <input type="text" name="username" placeholder="Usuario">
        <input type="password" name="password" placeholder="Contraseña">
        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
